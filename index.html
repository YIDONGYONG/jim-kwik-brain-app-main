<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>脳タイプ診断</title>
    <meta name="description" content="あなたの脳의 유형을 진단합니다." />
    <script>
      // 즉시 실행 로그
      console.log("HTML head script executing...");
      window.addEventListener('error', function(event) {
        console.error("Global error caught in HTML:", event.error);
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'color:red; padding:20px; position:fixed; top:0; background:white; z-index:9999; border:2px solid red;';
        errDiv.innerHTML = '<strong>Runtime Error:</strong> ' + event.message;
        document.body.appendChild(errDiv);
      });
    </script>
    <script type="module" crossorigin src="./assets/index-DjOte4uo.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Dyh1ywx9.css">
  </head>
  <body style="margin: 0; background: #f9fafb;">
    <div id="root">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #000; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: bold;">애플리케이션을 불러오는 중입니다...</p>
        <p id="debug-status" style="font-size: 12px; color: #666;">JavaScript를 로드하고 있습니다.</p>
      </div>
    </div>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
      window.onload = function() {
        document.getElementById('debug-status').innerText = "Window loaded, script should be running...";
      };
    </script>
  </body>
</html>
